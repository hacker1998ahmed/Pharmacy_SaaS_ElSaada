<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory - ElSaada Pharmacy</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="dashboard">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>🏥 ElSaada</h2>
        <p style="color: var(--text-secondary); font-size: 12px;">Pharmacy Management</p>
      </div>
      <ul class="sidebar-menu"></ul>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <div class="top-bar">
        <h1>Inventory Management</h1>
        <div class="user-info">
          <div class="user-avatar" id="userAvatar">A</div>
          <div>
            <div id="userName" style="font-weight: 600;">Admin</div>
            <div id="userRole" style="font-size: 12px; color: var(--text-secondary);">Administrator</div>
          </div>
        </div>
      </div>

      <!-- Product Filters -->
      <div class="card">
        <div class="card-header">
          <h3 class="card-title">Products</h3>
          <button class="btn btn-primary" id="addProductBtn">+ Add Product</button>
        </div>

        <div class="search-bar">
          <input type="text" id="productSearch" placeholder="Search by name or barcode...">
          <select id="filterCategory" style="padding: 12px 15px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; color: var(--text-primary);">
            <option value="">All Categories</option>
            <option value="medicines">Medicines</option>
            <option value="supplements">Supplements</option>
            <option value="cosmetics">Cosmetics</option>
            <option value="baby-care">Baby Care</option>
          </select>
        </div>

        <div class="table-responsive">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Barcode</th>
                <th>Price</th>
                <th>Stock</th>
                <th>Expiry</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="productsTable">
              <tr><td colspan="7" class="text-center">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- Add/Edit Product Modal -->
  <div class="modal" id="productModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Add New Product</h3>
        <button class="modal-close" onclick="closeModal('productModal')">×</button>
      </div>
      
      <form id="productForm">
        <input type="hidden" id="productId">
        
        <div class="form-group">
          <label>Product Name *</label>
          <input type="text" id="productName" required>
        </div>
        
        <div class="form-group">
          <label>Barcode</label>
          <input type="text" id="productBarcode">
        </div>
        
        <div class="flex gap-1">
          <div class="form-group" style="flex: 1;">
            <label>Selling Price *</label>
            <input type="number" step="0.01" id="productPrice" required>
          </div>
          <div class="form-group" style="flex: 1;">
            <label>Cost Price</label>
            <input type="number" step="0.01" id="productCostPrice">
          </div>
        </div>
        
        <div class="flex gap-1">
          <div class="form-group" style="flex: 1;">
            <label>Current Stock</label>
            <input type="number" id="productStock" value="0">
          </div>
          <div class="form-group" style="flex: 1;">
            <label>Min Stock Level</label>
            <input type="number" id="productMinStock" value="5">
          </div>
        </div>
        
        <div class="form-group">
          <label>Expiry Date</label>
          <input type="date" id="productExpiryDate">
        </div>
        
        <div class="form-group">
          <label>Category</label>
          <select id="productCategory">
            <option value="">Select Category</option>
            <option value="medicines">Medicines</option>
            <option value="supplements">Supplements</option>
            <option value="cosmetics">Cosmetics</option>
            <option value="baby-care">Baby Care</option>
            <option value="other">Other</option>
          </select>
        </div>
        
        <button type="submit" class="btn btn-primary btn-block mt-2">Save Product</button>
      </form>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
