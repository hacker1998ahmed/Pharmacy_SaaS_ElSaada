<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ElSaada Pharmacy - Register</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="login-container">
    <div class="login-box">
      <h1>🏥 ElSaada Pharmacy</h1>
      <p class="subtitle">Create New Account</p>
      
      <form id="registerForm">
        <div class="form-group">
          <label>Pharmacy Name</label>
          <input type="text" id="tenantName" required placeholder="Enter pharmacy name">
        </div>
        
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" required placeholder="Enter email">
        </div>
        
        <div class="form-group">
          <label>Phone</label>
          <input type="tel" id="phone" placeholder="Enter phone number">
        </div>
        
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="regUsername" required placeholder="Choose username">
        </div>
        
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="regPassword" required placeholder="Choose password">
        </div>
        
        <button type="submit" class="btn btn-primary btn-block">Register</button>
      </form>
      
      <p class="text-center mt-2">
        <a href="/login.html" style="color: var(--primary)">Already have an account? Login</a>
      </p>
    </div>
  </div>
  
  <script src="/app.js"></script>
</body>
</html>
